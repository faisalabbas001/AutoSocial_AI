services:
  postgres:
    image: postgres:16-alpine
    container_name: autosocial-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: autosocial
      POSTGRES_USER: autosocial
      POSTGRES_PASSWORD: autosocial
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autosocial"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: autosocial-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # S3-compatible object storage for local dev (stands in for Cloudflare R2).
  minio:
    image: minio/minio:latest
    container_name: autosocial-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: autosocial
      MINIO_ROOT_PASSWORD: autosocial123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data:
